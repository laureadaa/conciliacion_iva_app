<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conciliación del IVA</title>
<link rel="stylesheet" href="styles.css" />
<script src="vendor/xlsx.full.min.js"></script>
<script src="vendor/pdf.min.js"></script>
<script>
  if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = "vendor/pdf.worker.min.js";
</script>
</head>
<body>
<header>
  <h1>Conciliación del IVA</h1>
  <div class="hdr-actions">
    <label>Ejercicio
      <input id="ejercicio" type="number" min="2000" max="2099" value="2025" />
    </label>
    <button id="btn-clear" type="button">Limpiar todo</button>
  </div>
</header>

<main>
  <section class="grid-3">
    <div>
      <label class="dropzone" for="up-ventas">
        <strong>📤 Libro de Ventas</strong>
        <span id="info-ventas">Excel/CSV anual</span>
      </label>
      <input id="up-ventas" type="file" accept=".xlsx,.xls,.csv" hidden />
    </div>
    <div>
      <label class="dropzone" for="up-compras">
        <strong>📥 Libro de Compras</strong>
        <span id="info-compras">Excel/CSV anual</span>
      </label>
      <input id="up-compras" type="file" accept=".xlsx,.xls,.csv" hidden />
    </div>
    <div>
      <label class="dropzone" for="up-303">
        <strong>📄 Modelos 303 declarados</strong>
        <span id="info-303">Suelta los PDFs (uno por trimestre)</span>
      </label>
      <input id="up-303" type="file" accept="application/pdf" multiple hidden />
    </div>
  </section>

  <section class="card">
    <h2>Tu IVA por trimestre <small id="resumen-meta"></small></h2>
    <div class="table-wrap">
      <table id="tabla-resumen"></table>
    </div>
    <p class="hint" id="hint-resumen">Sube tus libros para que la app calcule automáticamente lo que debes declarar en cada casilla del Modelo 303. Sube también los PDFs del 303 declarado para que contraste lo declarado contra los libros.</p>
  </section>
</main>

<div id="modal" class="modal" hidden>
  <div class="modal-card">
    <h3 id="modal-title">Mapeo de columnas</h3>
    <div id="modal-body"></div>
    <div class="modal-foot">
      <button id="modal-cancel" type="button">Cancelar</button>
      <button id="modal-ok" type="button">Aplicar</button>
    </div>
  </div>
</div>

<div id="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
